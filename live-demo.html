<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="repository" content="https://github.com/xeave/live-demo" />
  <title>冷风直播</title>

  <link href="https://web.sdk.qcloud.com/player/tcplayer/release/v5.1.0/tcplayer.min.css" rel="stylesheet" />
  <script src="https://web.sdk.qcloud.com/player/tcplayer/release/v5.1.0/tcplayer.v5.1.0.min.js"></script>

  <style>
    :root {
      --red: #f0281a;
      --red-dark: #c41f10;
      --bg: #0a0a0a;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text-secondary: #888;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      font-size: 14px;
      overflow-x: hidden;
    }

    /* 官方构建标识（与 GitHub 提交 SHA 对照，部署时由 Actions 写入 build-info.json） */
    .build-verify {
      position: fixed;
      right: 10px;
      bottom: calc(10px + env(safe-area-inset-bottom, 0));
      z-index: 9998;
      font-size: 10px;
      color: rgba(136, 136, 136, 0.85);
      pointer-events: none;
      max-width: 70vw;
      text-align: right;
      line-height: 1.3;
    }

    /* ── 顶部状态栏 ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      z-index: 100;
    }
    .topbar-logo {
      width: 28px; height: 28px;
      background: var(--red);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .topbar-title { font-size: 16px; font-weight: 700; flex: 1; }
    .live-badge {
      background: var(--red);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 1px;
      animation: badgePulse 2s infinite;
    }
    @keyframes badgePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* ── 底部 Tab 栏 ── */
    .tabbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(56px + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    .tabbar-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: color .2s;
      font-size: 10px;
      font-weight: 500;
    }
    .tabbar-item.active { color: var(--red); }
    .tabbar-item .icon { font-size: 22px; line-height: 1; }

    /* ── 主内容区 ── */
    .main {
      padding-top: 56px;
      padding-bottom: calc(56px + var(--safe-bottom));
      min-height: 100vh;
      overflow-y: auto;
    }
    .page { display: none; }
    .page.active { display: block; }

    /* ── 视频区域（全宽 16:9）── */
    .video-block {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }
    .video-block video,
    .video-block #local_video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #local_video {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    .video-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #444;
    }
    .video-placeholder .icon { font-size: 36px; }
    .video-placeholder p { font-size: 12px; }

    /* 直播角标 */
    .video-badge {
      position: absolute;
      top: 10px; left: 10px;
      display: flex; align-items: center; gap: 5px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #555;
    }
    .dot.live { background: var(--red); animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* 推流统计浮层 */
    .video-stats {
      position: absolute;
      bottom: 10px; right: 10px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 10px;
      color: #ccc;
      display: none;
      gap: 8px;
      flex-direction: column;
    }
    .video-stats.show { display: flex; }
    .video-stats b { color: #4caf50; }

    /* ── 内容卡片 ── */
    .card {
      margin: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .card-header {
      padding: 14px 16px 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 1px solid var(--border);
    }

    /* ── 表单 ── */
    .field { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .field:last-child { border-bottom: none; }
    .field label {
      display: block;
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .field input, .field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .field input:focus, .field select:focus {
      border-color: var(--red);
    }
    .field input::placeholder { color: #3a3a3a; }
    .field .hint { font-size: 11px; color: #555; margin-top: 6px; line-height: 1.5; }

    /* ── 按钮 ── */
    .btn-area { padding: 12px; display: flex; gap: 10px; }
    .btn {
      flex: 1;
      height: 48px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn:active { opacity: .8; transform: scale(.97); }
    .btn:disabled { opacity: .35; }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    /* ── 日志 ── */
    .log-wrap { padding: 0 12px 12px; }
    .log-box {
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 11px;
      font-family: 'SF Mono', Menlo, monospace;
      max-height: 130px;
      overflow-y: auto;
      line-height: 1.8;
    }
    .log-box .ok   { color: #4caf50; }
    .log-box .err  { color: #f44336; }
    .log-box .info { color: #42a5f5; }
    .log-box .warn { color: #ffa726; }

    /* ── 提示横幅 ── */
    .tip {
      margin: 12px 12px 0;
      background: #1a1500;
      border: 1px solid #3d3000;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 12px;
      color: #c8a800;
      line-height: 1.7;
      display: flex;
      gap: 8px;
    }
    .tip .tip-icon { font-size: 16px; flex-shrink: 0; }

    /* select 箭头 */
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      pointer-events: none;
    }

    /* ══════════════════════════════════════
       主播全屏直播间
    ══════════════════════════════════════ */
    .anchor-fullscreen {
      position: fixed !important;
      inset: 0;
      background: #000;
      overflow: hidden;
      display: block !important;
    }

    /* 全屏摄像头 */
    .anchor-video {
      position: absolute;
      inset: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .anchor-video video {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* 顶部信息栏 */
    .anchor-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 48px 14px 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,.65) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .anchor-info { display: flex; align-items: center; gap: 10px; }
    .anchor-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--red);
      border: 2px solid #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .anchor-name { font-size: 14px; font-weight: 700; color: #fff; }
    .anchor-viewers {
      font-size: 11px; color: rgba(255,255,255,.75);
      display: flex; align-items: center; gap: 4px; margin-top: 2px;
    }
    .anchor-top-right { display: flex; align-items: center; gap: 8px; }
    .stat-pill {
      background: rgba(0,0,0,.45);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 10px;
      color: #4caf50;
      display: none;
    }
    .stat-pill.show { display: block; }
    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,.4);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }

    /* 弹幕区 */
    .danmu-area {
      position: absolute;
      left: 0; right: 80px;
      bottom: 100px;
      max-height: 220px;
      overflow: hidden;
      padding: 0 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      justify-content: flex-end;
    }
    .danmu-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,0,0,.4);
      backdrop-filter: blur(4px);
      border-radius: 16px;
      padding: 5px 12px;
      font-size: 12px;
      color: #fff;
      max-width: 90%;
      width: fit-content;
    }
    .danmu-name { color: #ffd740; font-weight: 600; }

    /* 底部工具栏 */
    .anchor-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px 14px calc(10px + var(--safe-bottom));
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 100%);
    }
    .anchor-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .fake-input {
      flex: 1;
      height: 40px;
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 0 16px;
      line-height: 40px;
      font-size: 13px;
      color: rgba(255,255,255,.6);
      cursor: pointer;
    }
    .round-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--red);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(240,40,26,.5);
    }
    .round-btn-gray { background: rgba(255,255,255,.2); box-shadow: none; }

    /* 设置抽屉 */
    .settings-mask {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.5);
      display: none;
      z-index: 10;
    }
    .settings-mask.show { display: block; }
    .settings-drawer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #1a1a1a;
      border-radius: 20px 20px 0 0;
      padding: 12px 16px calc(24px + var(--safe-bottom));
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      z-index: 11;
    }
    .settings-drawer.show { transform: translateY(0); }
    .drawer-handle {
      width: 36px; height: 4px;
      background: #444;
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .drawer-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .drawer-field { margin-bottom: 14px; }
    .drawer-field label {
      display: block;
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .drawer-field input, .drawer-field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      -webkit-appearance: none;
    }
    .drawer-field input:focus { border-color: var(--red); }
    .drawer-btns { display: flex; gap: 10px; margin-top: 4px; }
    .drawer-btns .btn { flex: 1; }

    /* ══════════════════════════════════════
       观众全屏直播间
    ══════════════════════════════════════ */
    .viewer-fullscreen {
      position: fixed !important;
      inset: 0;
      background: #000;
      overflow: hidden;
      display: none;
    }
    .viewer-fullscreen.active { display: block !important; }

    .viewer-video {
      position: absolute;
      inset: 0;
      background: #111;
    }
    .viewer-video video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 封面占位 */
    .viewer-cover {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(180deg, #1a0a2e 0%, #0a0a1a 100%);
    }
    .viewer-cover-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--red);
      border: 3px solid rgba(255,255,255,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
    }
    .viewer-cover-name { font-size: 18px; font-weight: 700; color: #fff; }
    .viewer-cover-tip  { font-size: 13px; color: rgba(255,255,255,.5); }

    /* 顶部信息 */
    .viewer-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 48px 14px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,.7) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* 关注按钮 */
    .follow-btn {
      height: 30px;
      padding: 0 14px;
      border-radius: 15px;
      border: none;
      background: var(--red);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .follow-btn.followed {
      background: rgba(255,255,255,.2);
      color: #fff;
    }

    /* 右侧互动按钮 */
    .viewer-side {
      position: absolute;
      right: 12px;
      bottom: 110px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }

    /* 底部输入栏 */
    .viewer-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px 14px calc(10px + var(--safe-bottom));
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 100%);
    }
    .viewer-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .gift-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* 点赞飘心动画 */
    @keyframes floatHeart {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
    }
    .float-heart {
      position: absolute;
      right: 30px;
      bottom: 120px;
      font-size: 28px;
      pointer-events: none;
      animation: floatHeart 1.5s ease-out forwards;
    }

    /* 右侧功能按钮组 */
    .side-btns {
      position: absolute;
      right: 12px;
      bottom: 110px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      z-index: 5;
    }
    .side-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
    }
    .side-btn-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      border: 1px solid rgba(255,255,255,.15);
    }
    .side-btn-label {
      font-size: 10px;
      color: rgba(255,255,255,.8);
    }
  </style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <div class="topbar-logo">📡</div>
  <div class="topbar-title">冷风直播</div>
  <div class="live-badge">LIVE</div>
</div>

<!-- 主内容 -->
<div class="main">

  <!-- ========== 主播页（全屏直播间）========== -->
  <div id="page-anchor" class="page active anchor-fullscreen">

    <!-- 全屏摄像头画面 -->
    <div id="local_video" class="anchor-video">
      <div class="video-placeholder">
        <div class="icon">🎙</div>
        <p>点击下方「开始推流」开启摄像头</p>
      </div>
    </div>

    <!-- 顶部覆盖层：头像 + 直播信息 + 关闭 -->
    <div class="anchor-top">
      <div class="anchor-info">
        <div class="anchor-avatar">🐱</div>
        <div>
          <div class="anchor-name">冷风直播间</div>
          <div class="anchor-viewers"><span class="dot" id="push-dot"></span> <span id="push-status">未开播</span></div>
        </div>
      </div>
      <div class="anchor-top-right">
        <div class="stat-pill" id="stat-bar">
          <span id="stat-fps">0</span>fps &nbsp;
          <span id="stat-vbr">0</span>k
        </div>
        <button class="icon-btn" onclick="showSettings()">⚙️</button>
      </div>
    </div>

    <!-- 弹幕区 -->
    <div class="danmu-area" id="danmu-area">
      <div class="danmu-item"><span class="danmu-name">系统</span> 欢迎来到冷风直播间 🎉</div>
    </div>

    <!-- 底部工具栏 -->
    <div class="anchor-bottom">
      <div class="anchor-input-row">
        <div class="fake-input">说点什么...</div>
        <button class="round-btn" onclick="togglePush()" id="btn-push-toggle">
          <span id="push-icon">▶</span>
        </button>
        <button class="round-btn round-btn-gray" onclick="showSettings()">🛒</button>
        <button class="round-btn round-btn-gray" onclick="showSettings()">📊</button>
      </div>
    </div>

    <!-- 右侧功能按钮组 -->
    <div class="side-btns">
      <div class="side-btn" onclick="showSettings()">
        <div class="side-btn-icon">⚙️</div>
        <div class="side-btn-label">设置</div>
      </div>
      <div class="side-btn">
        <div class="side-btn-icon">🛒</div>
        <div class="side-btn-label">商品</div>
      </div>
      <div class="side-btn">
        <div class="side-btn-icon">📊</div>
        <div class="side-btn-label">数据</div>
      </div>
      <div class="side-btn">
        <div class="side-btn-icon">🔄</div>
        <div class="side-btn-label">翻转</div>
      </div>
    </div>

    <!-- 设置抽屉（默认隐藏） -->
    <div class="settings-mask" id="settings-mask" onclick="hideSettings()"></div>
    <div class="settings-drawer" id="settings-drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-title">推流设置</div>
      <div class="drawer-field">
        <label>WebRTC 推流地址</label>
        <input id="push-url" type="url" inputmode="url"
          value="webrtc://229319.push.tlivecloud.com/live/1?txSecret=cf9c27bc3ffb73bdf139d70c2de0c076&txTime=69F2B02F"
          placeholder="webrtc://domain/live/stream?txSecret=&txTime=" />
        <div class="hint">云直播控制台 → 直播工具箱 → 地址生成器</div>
      </div>
      <div class="drawer-field">
        <label>视频质量</label>
        <div class="select-wrap">
          <select id="video-quality">
            <option value="720p">720p（推荐）</option>
            <option value="480p">480p（省流量）</option>
            <option value="1080p">1080p（高清）</option>
          </select>
        </div>
      </div>
      <div class="drawer-btns">
        <button class="btn btn-primary" id="btn-push" onclick="startPush()">▶ 开始推流</button>
        <button class="btn btn-secondary" id="btn-stop" onclick="stopPush()" disabled>■ 停止推流</button>
      </div>
      <div class="log-box" id="push-log" style="margin-top:10px">
        <div class="info">填好推流地址后点「开始推流」</div>
      </div>
    </div>

  </div>

  <!-- ========== 观众页（全屏直播间）========== -->
  <div id="page-viewer" class="page viewer-fullscreen">

    <!-- 全屏播放器 -->
    <div id="player-wrap" class="viewer-video">
      <video id="player-container" preload="auto" playsinline webkit-playsinline></video>
      <!-- 未播放时的封面占位 -->
      <div class="viewer-cover" id="viewer-cover">
        <div class="viewer-cover-avatar">🐱</div>
        <div class="viewer-cover-name">冷风直播间</div>
        <div class="viewer-cover-tip">主播正在准备中...</div>
      </div>
    </div>

    <!-- 顶部信息栏 -->
    <div class="viewer-top">
      <div class="anchor-info">
        <div class="anchor-avatar">🐱</div>
        <div>
          <div class="anchor-name">冷风直播间</div>
          <div class="anchor-viewers">
            <span class="dot live"></span> 直播中 · <span id="viewer-count">1.2k</span> 人观看
          </div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="follow-btn" id="follow-btn" onclick="toggleFollow()">+ 关注</button>
        <button class="icon-btn" onclick="showPlayerSettings()">⚙️</button>
      </div>
    </div>

    <!-- 右侧互动按钮 -->
    <div class="viewer-side">
      <div class="side-btn" onclick="sendLike()">
        <div class="side-btn-icon" id="like-icon">🤍</div>
        <div class="side-btn-label" id="like-count">0</div>
      </div>
      <div class="side-btn">
        <div class="side-btn-icon">💬</div>
        <div class="side-btn-label">评论</div>
      </div>
      <div class="side-btn">
        <div class="side-btn-icon">↗️</div>
        <div class="side-btn-label">分享</div>
      </div>
      <div class="side-btn">
        <div class="side-btn-icon">🛒</div>
        <div class="side-btn-label">商品</div>
      </div>
    </div>

    <!-- 弹幕区 -->
    <div class="danmu-area" id="viewer-danmu">
      <div class="danmu-item"><span class="danmu-name">系统</span> 欢迎来到冷风直播间 🎉</div>
    </div>

    <!-- 底部输入栏 -->
    <div class="viewer-bottom">
      <div class="viewer-input-row">
        <div class="fake-input" onclick="showPlayerSettings()">说点什么...</div>
        <div class="gift-btn">🎁</div>
        <div class="gift-btn" style="background:var(--red)" onclick="sendLike()">❤️</div>
      </div>
    </div>

    <!-- 播放设置抽屉 -->
    <div class="settings-mask" id="player-mask" onclick="hidePlayerSettings()"></div>
    <div class="settings-drawer" id="player-drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-title">播放设置</div>
      <div class="drawer-field">
        <label>播放地址</label>
        <input id="pull-url" type="url" inputmode="url"
          placeholder="webrtc:// 或 http://xxx.m3u8" />
        <div class="hint">流名称须与推流地址一致 · 推荐 WebRTC（超低延迟）</div>
      </div>
      <div class="drawer-field">
        <label>License URL（本地调试可不填）</label>
        <input id="pull-license" type="url"
          placeholder="https://license.vod2.myqcloud.com/license/v2/..." />
      </div>
      <div class="drawer-btns">
        <button class="btn btn-primary" onclick="startPlay()">▶ 开始播放</button>
        <button class="btn btn-secondary" onclick="stopPlay()">■ 停止</button>
      </div>
      <div class="log-box" id="pull-log" style="margin-top:10px">
        <div class="info">先开播，再来这里播放</div>
      </div>
    </div>

  </div>

</div><!-- /main -->

<!-- 底部 Tab 栏 -->
<div class="tabbar">
  <div class="tabbar-item active" id="tab-anchor" onclick="switchPage('anchor')">
    <div class="icon">🎙</div>
    <div>主播</div>
  </div>
  <div class="tabbar-item" id="tab-viewer" onclick="switchPage('viewer')">
    <div class="icon">📺</div>
    <div>观众</div>
  </div>
</div>


<!-- 推流 SDK 必须放 body 末尾 -->
<script src="https://video.sdk.qcloudecdn.com/web/TXLivePusher-2.1.1.min.js" charset="utf-8"></script>

<script>
// ── 工具 ──────────────────────────────────────
function log(id, msg, type = 'info') {
  const box = document.getElementById(id);
  const el = document.createElement('div');
  el.className = type;
  el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

// ── Tab 切换 ──────────────────────────────────
function switchPage(name) {
  ['anchor', 'viewer'].forEach(n => {
    document.getElementById('page-' + n).classList.toggle('active', n === name);
    document.getElementById('tab-' + n).classList.toggle('active', n === name);
  });
  // 主播页全屏时隐藏顶栏和底栏
  const isAnchor = name === 'anchor';
  document.querySelector('.topbar').style.display = isAnchor ? 'none' : '';
  document.querySelector('.tabbar').style.display = isAnchor ? 'none' : '';
}

// 初始化：主播页默认隐藏顶栏底栏
document.querySelector('.topbar').style.display = 'none';
document.querySelector('.tabbar').style.display = 'none';

// ── 设置抽屉 ─────────────────────────────────
function showSettings() {
  document.getElementById('settings-mask').classList.add('show');
  document.getElementById('settings-drawer').classList.add('show');
}
function hideSettings() {
  document.getElementById('settings-mask').classList.remove('show');
  document.getElementById('settings-drawer').classList.remove('show');
}

// ── 推流按钮切换 ──────────────────────────────
function togglePush() {
  const isLive = !document.getElementById('btn-stop').disabled;
  if (isLive) {
    stopPush();
  } else {
    showSettings();
  }
}

// ── 弹幕模拟 ─────────────────────────────────
const fakeUsers = ['小明','辰辰','买买买','冰冰','大壮'];
const fakeMsgs  = ['在吗主播！','这个多少钱？','好看！','链接链接！','已下单✅','求上链接','太好看了'];
function addDanmu(name, msg) {
  const area = document.getElementById('danmu-area');
  const el = document.createElement('div');
  el.className = 'danmu-item';
  el.innerHTML = `<span class="danmu-name">${name}</span> ${msg}`;
  area.appendChild(el);
  if (area.children.length > 8) area.removeChild(area.children[0]);
}
setInterval(() => {
  if (!document.getElementById('btn-stop').disabled) return; // 推流中才滚弹幕
  const u = fakeUsers[Math.floor(Math.random() * fakeUsers.length)];
  const m = fakeMsgs[Math.floor(Math.random() * fakeMsgs.length)];
  addDanmu(u, m);
}, 2500);

// ── 主播推流 ──────────────────────────────────
let livePusher = null;

async function startPush() {
  const pushUrl = document.getElementById('push-url').value.trim();
  if (!pushUrl) { alert('请填写推流地址'); return; }
  if (!pushUrl.startsWith('webrtc://')) { alert('推流地址须以 webrtc:// 开头'); return; }
  if (typeof TXLivePusher === 'undefined') {
    log('push-log', 'SDK 加载失败，请检查网络后刷新', 'err'); return;
  }

  try {
    log('push-log', '检测浏览器兼容性...', 'info');
    const support = await TXLivePusher.checkSupport();
    if (!support.isWebRTCSupported) {
      log('push-log', '浏览器不支持 WebRTC，请换用 Chrome', 'err'); return;
    }
    log('push-log', '兼容性检测通过 ✓', 'ok');

    livePusher = new TXLivePusher();
    livePusher.setRenderView('local_video');
    livePusher.videoView.muted = true;

    const vq = document.getElementById('video-quality').value;
    livePusher.setVideoQuality(vq);
    livePusher.setAudioQuality('standard');
    livePusher.setProperty('setVideoFPS', 25);

    livePusher.setObserver({
      onPushStatusUpdate(status, msg) {
        const map = {
          disconnected: ['连接断开', 'warn'],
          connecting:   ['连接中...', 'info'],
          connected:    ['连接成功 ✓', 'ok'],
          reconnecting: ['重连中...', 'warn'],
        };
        const [text, type] = map[status] || [status, 'info'];
        log('push-log', text, type);
      },
      onStatisticsUpdate(data) {
        const fps = (data.video && data.video.framesPerSecond) || 0;
        const vbr = Math.round(((data.video && data.video.bitrate) || 0) / 1000);
        const el = document.getElementById('stat-fps');
        const el2 = document.getElementById('stat-vbr');
        if (el) el.textContent = fps;
        if (el2) el2.textContent = vbr;
      },
    });

    log('push-log', '请求摄像头和麦克风权限（弹窗请点「允许」）', 'warn');
    await Promise.all([livePusher.startCamera(), livePusher.startMicrophone()]);
    log('push-log', '摄像头已开启 ✓', 'ok');

    await livePusher.startPush(pushUrl);

    document.getElementById('push-dot').classList.add('live');
    document.getElementById('push-status').textContent = '直播中';
    document.getElementById('btn-push').disabled = true;
    document.getElementById('btn-stop').disabled = false;
    document.getElementById('stat-bar').classList.add('show');
    hideSettings();
    document.getElementById('push-icon').textContent = '■';
    log('push-log', '推流成功！正在直播 ✓', 'ok');

  } catch (e) {
    log('push-log', `失败：${e.message || e}`, 'err');
  }
}

function stopPush() {
  if (!livePusher) return;
  livePusher.stopPush();
  livePusher.stopCamera();
  livePusher.stopMicrophone();
  livePusher = null;

  document.getElementById('push-dot').classList.remove('live');
  document.getElementById('push-status').textContent = '未开播';
  document.getElementById('btn-push').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('stat-bar').classList.remove('show');
  document.getElementById('push-icon').textContent = '▶';
  document.getElementById('local_video').innerHTML =
    '<div class="video-placeholder"><div class="icon">🎙</div><p>点击「开始推流」开启摄像头</p></div>';
  log('push-log', '已停止推流', 'info');
}

// ── 观众页抽屉 ────────────────────────────────
function showPlayerSettings() {
  document.getElementById('player-mask').classList.add('show');
  document.getElementById('player-drawer').classList.add('show');
}
function hidePlayerSettings() {
  document.getElementById('player-mask').classList.remove('show');
  document.getElementById('player-drawer').classList.remove('show');
}

// ── 关注 ─────────────────────────────────────
let followed = false;
function toggleFollow() {
  followed = !followed;
  const btn = document.getElementById('follow-btn');
  btn.textContent = followed ? '✓ 已关注' : '+ 关注';
  btn.classList.toggle('followed', followed);
}

// ── 点赞飘心 ──────────────────────────────────
let likeCount = 0;
function sendLike() {
  likeCount++;
  document.getElementById('like-count').textContent =
    likeCount > 999 ? (likeCount / 1000).toFixed(1) + 'k' : likeCount;
  document.getElementById('like-icon').textContent = '❤️';
  const heart = document.createElement('div');
  heart.className = 'float-heart';
  heart.textContent = ['❤️','💕','💗','💖'][Math.floor(Math.random() * 4)];
  heart.style.right = (20 + Math.random() * 40) + 'px';
  document.getElementById('page-viewer').appendChild(heart);
  setTimeout(() => heart.remove(), 1500);
}

// ── 观众弹幕 ─────────────────────────────────
const viewerUsers = ['小红','阿强','买买买','乐乐','大壮','晓晓'];
const viewerMsgs  = ['这个多少钱？','好看！','求链接！','已下单✅','太好看了','主播加油！','哪里买？'];
function addViewerDanmu(name, msg) {
  const area = document.getElementById('viewer-danmu');
  if (!area) return;
  const el = document.createElement('div');
  el.className = 'danmu-item';
  el.innerHTML = `<span class="danmu-name">${name}</span> ${msg}`;
  area.appendChild(el);
  if (area.children.length > 8) area.removeChild(area.children[0]);
}
setInterval(() => {
  if (!player) return;
  const u = viewerUsers[Math.floor(Math.random() * viewerUsers.length)];
  const m = viewerMsgs[Math.floor(Math.random() * viewerMsgs.length)];
  addViewerDanmu(u, m);
  // 随机涨人数
  const base = 1200 + Math.floor(Math.random() * 50 - 25);
  document.getElementById('viewer-count').textContent =
    base > 1000 ? (base / 1000).toFixed(1) + 'k' : base;
}, 3000);

// ── 观众播放 ──────────────────────────────────
let player = null;

function startPlay() {
  const url     = document.getElementById('pull-url').value.trim();
  const license = document.getElementById('pull-license').value.trim();
  if (!url) { alert('请填写播放地址'); return; }

  if (player) {
    player.destroy();
    player = null;
    document.getElementById('player-wrap').innerHTML =
      '<video id="player-container" preload="auto" playsinline webkit-playsinline></video>';
  }

  try {
    let playUrl = url;
    const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    if (isLocal && url.startsWith('webrtc://')) {
      playUrl = url.replace('webrtc://', 'http://').replace(/\?.*$/, '') + '.m3u8';
      log('pull-log', `本地环境自动转为 HLS：${playUrl}`, 'warn');
    }
    const cfg = { sources: [{ src: playUrl }], autoplay: true, live: true, width: '100%', height: '100%' };
    if (license) cfg.licenseUrl = license;

    player = TCPlayer('player-container', cfg);
    player.on('playing', () => {
      log('pull-log', '播放中 ✓', 'ok');
      const cover = document.getElementById('viewer-cover');
      if (cover) cover.style.display = 'none';
      hidePlayerSettings();
    });
    player.on('waiting', () => log('pull-log', '缓冲中...', 'info'));
    player.on('error',   () => log('pull-log', '播放出错，检查地址或主播是否在线', 'err'));
    player.on('ended',   () => log('pull-log', '直播已结束', 'warn'));
    log('pull-log', '播放器就绪，等待视频流...', 'ok');
  } catch (e) {
    log('pull-log', `初始化失败：${e.message}`, 'err');
  }
}

function stopPlay() {
  if (!player) return;
  player.pause();
  player.destroy();
  player = null;
  document.getElementById('player-wrap').innerHTML =
    '<video id="player-container" preload="auto" playsinline webkit-playsinline></video>';
  log('pull-log', '已停止播放', 'info');
}
</script>
<div id="build-verify" class="build-verify" hidden aria-hidden="true"></div>
<script>
(function () {
  var el = document.getElementById('build-verify');
  if (!el) return;
  fetch('build-info.json', { cache: 'no-store' })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (j) {
      if (!j || !j.commit) return;
      el.textContent = '官方构建 · ' + j.commit.slice(0, 7);
      el.title = '仓库：' + (j.repo || '') + '\n提交：' + j.commit + '\n构建：' + (j.builtAt || '');
      el.hidden = false;
    })
    .catch(function () {});
})();
</script>
</body>

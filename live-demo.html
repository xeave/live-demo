<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="repository" content="https://github.com/xeave/live-demo" />
  <title>冷丰直播 — 主播</title>

  <style>
    :root {
      --red: #f0281a;
      --red-dark: #c41f10;
      --bg: #0a0a0a;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text-secondary: #888;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      font-size: 16px;
      overflow: hidden;
    }

    .build-verify {
      position: fixed;
      right: 10px;
      bottom: calc(10px + env(safe-area-inset-bottom, 0));
      z-index: 9998;
      font-size: 10px;
      color: rgba(136, 136, 136, 0.85);
      pointer-events: none;
      max-width: 70vw;
      text-align: right;
      line-height: 1.3;
    }

    /* ══════════════════════════════════════
       主播全屏直播间
    ══════════════════════════════════════ */
    .anchor-fullscreen {
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
    }

    .anchor-video {
      position: absolute;
      inset: 0;
      background: #111;
    }

    /*
     * 预览容器必须铺满全屏。勿用 position:relative 覆盖 .anchor-video，
     * 否则仅有绝对定位的 <video> 时父级高度会塌成 0（出现 video 375×0）。
     */
    #local_video {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: block;
      background: #000;
      overflow: hidden;
    }
    /* SDK 可能先插入包裹层；占位层保持原样 */
    #local_video > *:not(.video-placeholder) {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }
    /* 使用后代选择器：video 可能在包裹层内，不一定是直接子节点 */
    #local_video video {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      object-fit: cover !important;
      display: block;
      z-index: 0;
    }
    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #444;
    }
    .video-placeholder .icon { font-size: 36px; }
    .video-placeholder p { font-size: 12px; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #555;
    }
    .dot.live { background: var(--red); animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .anchor-top {
      position: absolute;
      z-index: 1;
      top: 0; left: 0; right: 0;
      padding: 48px 14px 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,.65) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .anchor-info { display: flex; align-items: center; gap: 10px; }
    .anchor-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--red);
      border: 2px solid #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .anchor-name { font-size: 16px; font-weight: 700; color: #fff; }
    .anchor-viewers {
      font-size: 13px; color: rgba(255,255,255,.75);
      display: flex; align-items: center; gap: 4px; margin-top: 2px;
    }
    .anchor-top-right { display: flex; align-items: center; gap: 8px; }
    .stat-pill {
      background: rgba(0,0,0,.45);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 10px;
      color: #4caf50;
      display: none;
    }
    .stat-pill.show { display: block; }
    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,.4);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }

    .danmu-area {
      position: absolute;
      z-index: 1;
      left: 0; right: 80px;
      bottom: 100px;
      max-height: 220px;
      overflow: hidden;
      padding: 0 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      justify-content: flex-end;
    }
    .danmu-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,0,0,.4);
      backdrop-filter: blur(4px);
      border-radius: 16px;
      padding: 6px 14px;
      font-size: 14px;
      color: #fff;
      max-width: 90%;
      width: fit-content;
    }
    .danmu-name { color: #ffd740; font-weight: 600; }

    .anchor-bottom {
      position: absolute;
      z-index: 1;
      bottom: 0; left: 0; right: 0;
      padding: 10px 14px calc(10px + var(--safe-bottom));
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 100%);
    }
    .anchor-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .fake-input {
      flex: 1;
      height: 40px;
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 0 16px;
      line-height: 40px;
      font-size: 15px;
      color: rgba(255,255,255,.6);
      cursor: pointer;
    }
    .round-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--red);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(240,40,26,.5);
    }
    .round-btn-gray { background: rgba(255,255,255,.2); box-shadow: none; }
    .round-btn-img img { width: 24px; height: 24px; display: block; filter: brightness(0) invert(1); }

    .settings-mask {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.5);
      display: none;
      z-index: 10;
    }
    .settings-mask.show { display: block; }
    .settings-drawer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #1a1a1a;
      border-radius: 20px 20px 0 0;
      padding: 12px 16px calc(24px + var(--safe-bottom));
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      z-index: 11;
    }
    .settings-drawer.show { transform: translateY(0); }
    .drawer-handle {
      width: 36px; height: 4px;
      background: #444;
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .drawer-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .drawer-field { margin-bottom: 14px; }
    .drawer-field label {
      display: block;
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .drawer-field input, .drawer-field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      -webkit-appearance: none;
    }
    .drawer-field input:focus { border-color: var(--red); }
    .drawer-btns { display: flex; gap: 10px; margin-top: 4px; }
    .drawer-btns .btn { flex: 1; }

    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      pointer-events: none;
    }

    .btn {
      flex: 1;
      height: 48px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn:active { opacity: .8; transform: scale(.97); }
    .btn:disabled { opacity: .35; }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    .log-box {
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 11px;
      font-family: 'SF Mono', Menlo, monospace;
      max-height: 130px;
      overflow-y: auto;
      line-height: 1.8;
    }
    .log-box .ok   { color: #4caf50; }
    .log-box .err  { color: #f44336; }
    .log-box .info { color: #42a5f5; }
    .log-box .warn { color: #ffa726; }

    .drawer-field .hint { font-size: 11px; color: #555; margin-top: 6px; line-height: 1.5; }

    .side-btns {
      position: absolute;
      right: 12px;
      bottom: 110px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      z-index: 5;
    }
    .side-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
    }
    .side-btn-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      border: 1px solid rgba(255,255,255,.15);
    }
    .side-btn-icon-img img { width: 24px; height: 24px; display: block; filter: brightness(0) invert(1); }
    .side-btn-label {
      font-size: 12px;
      color: rgba(255,255,255,.8);
    }
  </style>
</head>
<body>

<div id="page-anchor" class="anchor-fullscreen">

  <div id="local_video" class="anchor-video">
    <div class="video-placeholder">
      <div class="icon">🎙</div>
      <p>点击下方「开始推流」开启摄像头</p>
    </div>
  </div>

  <div class="anchor-top">
    <div class="anchor-info">
      <div class="anchor-avatar">🐱</div>
      <div>
        <div class="anchor-name">冷丰直播间</div>
        <div class="anchor-viewers"><span class="dot" id="push-dot"></span> <span id="push-status">未开播</span></div>
      </div>
    </div>
    <div class="anchor-top-right">
      <div class="stat-pill" id="stat-bar">
        <span id="stat-fps">0</span>fps &nbsp;
        <span id="stat-vbr">0</span>k
      </div>
      <button type="button" class="icon-btn" onclick="showSettings()">⚙️</button>
    </div>
  </div>

  <div class="danmu-area" id="danmu-area">
    <div class="danmu-item"><span class="danmu-name">系统</span> 欢迎来到冷丰直播间 🎉</div>
  </div>

  <div class="anchor-bottom">
    <div class="anchor-input-row">
      <div class="fake-input">说点什么...</div>
      <button type="button" class="round-btn" onclick="togglePush()" id="btn-push-toggle">
        <span id="push-icon">▶</span>
      </button>
      <button type="button" class="round-btn round-btn-gray round-btn-img" onclick="showSettings()" aria-label="购物车">
        <img src="images/live-sheet-cart-red.png" alt="购物车">
      </button>
      <button type="button" class="round-btn round-btn-gray round-btn-img" onclick="showSettings()" aria-label="订单">
        <img src="images/live-sheet-order.png" alt="订单">
      </button>
    </div>
  </div>

  <div class="side-btns">
    <div class="side-btn" onclick="showSettings()">
      <div class="side-btn-icon">⚙️</div>
      <div class="side-btn-label">设置</div>
    </div>
    <div class="side-btn">
      <div class="side-btn-icon side-btn-icon-img">
        <img src="images/live-sheet-cart-red.png" alt="商品">
      </div>
      <div class="side-btn-label">商品</div>
    </div>
    <div class="side-btn">
      <div class="side-btn-icon side-btn-icon-img">
        <img src="images/live-sheet-order.png" alt="数据">
      </div>
      <div class="side-btn-label">数据</div>
    </div>
  </div>

  <div class="settings-mask" id="settings-mask" onclick="hideSettings()"></div>
  <div class="settings-drawer" id="settings-drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title">推流设置</div>
    <div class="drawer-field">
      <label>WebRTC 推流地址</label>
      <input id="push-url" type="url" inputmode="url"
        value="webrtc://229319.push.tlivecloud.com/live/1?txSecret=cf9c27bc3ffb73bdf139d70c2de0c076&txTime=69F2B02F"
        placeholder="webrtc://domain/live/stream?txSecret=&txTime=" />
      <div class="hint">云直播控制台 → 直播工具箱 → 地址生成器</div>
    </div>
    <div class="drawer-field">
      <label>视频质量</label>
      <div class="select-wrap">
        <select id="video-quality">
          <option value="720p">720p（推荐）</option>
          <option value="480p">480p（省流量）</option>
          <option value="1080p">1080p（高清）</option>
        </select>
      </div>
    </div>
    <div class="drawer-btns">
      <button type="button" class="btn btn-primary" id="btn-push" onclick="startPush()">▶ 开始推流</button>
      <button type="button" class="btn btn-secondary" id="btn-stop" onclick="stopPush()" disabled>■ 停止推流</button>
    </div>
    <div class="log-box" id="push-log" style="margin-top:10px">
      <div class="info">填好推流地址后点「开始推流」</div>
    </div>
  </div>

</div>

<script src="https://video.sdk.qcloudecdn.com/web/TXLivePusher-2.1.1.min.js" charset="utf-8"></script>

<script>
function log(id, msg, type = 'info') {
  const box = document.getElementById(id);
  const el = document.createElement('div');
  el.className = type;
  el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function showSettings() {
  document.getElementById('settings-mask').classList.add('show');
  document.getElementById('settings-drawer').classList.add('show');
}
function hideSettings() {
  document.getElementById('settings-mask').classList.remove('show');
  document.getElementById('settings-drawer').classList.remove('show');
}

function togglePush() {
  const isLive = !document.getElementById('btn-stop').disabled;
  if (isLive) {
    stopPush();
  } else {
    showSettings();
  }
}

const fakeUsers = ['小明','辰辰','买买买','冰冰','大壮'];
const fakeMsgs  = ['在吗主播！','这个多少钱？','好看！','链接链接！','已下单✅','求上链接','太好看了'];
function addDanmu(name, msg) {
  const area = document.getElementById('danmu-area');
  const el = document.createElement('div');
  el.className = 'danmu-item';
  el.innerHTML = `<span class="danmu-name">${name}</span> ${msg}`;
  area.appendChild(el);
  if (area.children.length > 8) area.removeChild(area.children[0]);
}
setInterval(() => {
  if (!document.getElementById('btn-stop').disabled) return;
  const u = fakeUsers[Math.floor(Math.random() * fakeUsers.length)];
  const m = fakeMsgs[Math.floor(Math.random() * fakeMsgs.length)];
  addDanmu(u, m);
}, 2500);

let livePusher = null;

async function startPush() {
  const pushUrl = document.getElementById('push-url').value.trim();
  if (!pushUrl) { alert('请填写推流地址'); return; }
  if (!pushUrl.startsWith('webrtc://')) { alert('推流地址须以 webrtc:// 开头'); return; }
  if (typeof TXLivePusher === 'undefined') {
    log('push-log', 'SDK 加载失败，请检查网络后刷新', 'err'); return;
  }

  try {
    if (livePusher) {
      log('push-log', '已在推流中，请先停止再开始', 'warn');
      return;
    }

    log('push-log', '检测浏览器兼容性...', 'info');
    const support = await TXLivePusher.checkSupport();
    if (!support.isWebRTCSupported) {
      log('push-log', '浏览器不支持 WebRTC，请换用 Chrome', 'err'); return;
    }
    log('push-log', '兼容性检测通过 ✓', 'ok');

    /* 必须先清空容器，否则会与占位层并存，SDK 可能注入多个 <video> 并排显示 */
    document.getElementById('local_video').innerHTML = '';

    livePusher = new TXLivePusher();
    livePusher.setRenderView('local_video');
    livePusher.videoView.muted = true;

    const vq = document.getElementById('video-quality').value;
    livePusher.setVideoQuality(vq);
    livePusher.setAudioQuality('standard');
    livePusher.setProperty('setVideoFPS', 25);
    try {
      const vres = { '480p': { width: 854, height: 480 }, '720p': { width: 1280, height: 720 }, '1080p': { width: 1920, height: 1080 } }[vq] || { width: 1280, height: 720 };
      livePusher.setProperty('setVideoResolution', vres);
    } catch (e) { /* SDK 不支持时忽略 */ }

    livePusher.setObserver({
      onPushStatusUpdate(status, msg) {
        const map = {
          disconnected: ['连接断开', 'warn'],
          connecting:   ['连接中...', 'info'],
          connected:    ['连接成功 ✓', 'ok'],
          reconnecting: ['重连中...', 'warn'],
        };
        const [text, type] = map[status] || [status, 'info'];
        log('push-log', text, type);
      },
      onStatisticsUpdate(data) {
        const fps = (data.video && data.video.framesPerSecond) || 0;
        const vbr = Math.round(((data.video && data.video.bitrate) || 0) / 1000);
        const el = document.getElementById('stat-fps');
        const el2 = document.getElementById('stat-vbr');
        if (el) el.textContent = fps;
        if (el2) el2.textContent = vbr;
      },
    });

    log('push-log', '请求摄像头和麦克风权限（弹窗请点「允许」）', 'warn');
    await Promise.all([livePusher.startCamera(), livePusher.startMicrophone()]);
    log('push-log', '摄像头已开启 ✓', 'ok');

    await livePusher.startPush(pushUrl);

    document.getElementById('push-dot').classList.add('live');
    document.getElementById('push-status').textContent = '直播中';
    document.getElementById('btn-push').disabled = true;
    document.getElementById('btn-stop').disabled = false;
    document.getElementById('stat-bar').classList.add('show');
    hideSettings();
    document.getElementById('push-icon').textContent = '■';
    log('push-log', '推流成功！正在直播 ✓', 'ok');

  } catch (e) {
    log('push-log', `失败：${e.message || e}`, 'err');
    if (livePusher) {
      try {
        livePusher.stopPush();
        livePusher.stopCamera();
        livePusher.stopMicrophone();
      } catch (err) { /* ignore */ }
      livePusher = null;
    }
    document.getElementById('local_video').innerHTML =
      '<div class="video-placeholder"><div class="icon">🎙</div><p>点击「开始推流」开启摄像头</p></div>';
  }
}

function stopPush() {
  if (!livePusher) return;
  livePusher.stopPush();
  livePusher.stopCamera();
  livePusher.stopMicrophone();
  livePusher = null;

  document.getElementById('push-dot').classList.remove('live');
  document.getElementById('push-status').textContent = '未开播';
  document.getElementById('btn-push').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('stat-bar').classList.remove('show');
  document.getElementById('push-icon').textContent = '▶';
  document.getElementById('local_video').innerHTML =
    '<div class="video-placeholder"><div class="icon">🎙</div><p>点击「开始推流」开启摄像头</p></div>';
  log('push-log', '已停止推流', 'info');
}
</script>
<div id="build-verify" class="build-verify" hidden aria-hidden="true"></div>
<script>
(function () {
  var el = document.getElementById('build-verify');
  if (!el) return;
  fetch('build-info.json', { cache: 'no-store' })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (j) {
      if (!j || !j.commit) return;
      el.textContent = '官方构建 · ' + j.commit.slice(0, 7);
      el.title = '仓库：' + (j.repo || '') + '\n提交：' + j.commit + '\n构建：' + (j.builtAt || '');
      el.hidden = false;
    })
    .catch(function () {});
})();
</script>
</body>
</html>

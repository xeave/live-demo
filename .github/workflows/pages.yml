# 推送到 main 后发布到 GitHub Pages，并生成 build-info.json 供页面对照仓库提交（防伪校验）
name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 生成构建信息
        run: |
          printf '%s\n' '{"repo":"https://github.com/xeave/live-demo","commit":"'"$GITHUB_SHA"'","builtAt":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}' > build-info.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

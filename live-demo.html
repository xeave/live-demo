<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="repository" content="https://github.com/xeave/live-demo" />
  <title>冷丰直播 — 主播</title>

  <style>
    :root {
      --red: #f0281a;
      --red-dark: #c41f10;
      --bg: #0a0a0a;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text-secondary: #888;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      font-size: 16px;
      overflow: hidden;
    }

    .build-verify {
      position: fixed;
      right: 10px;
      bottom: calc(10px + env(safe-area-inset-bottom, 0));
      z-index: 9998;
      font-size: 10px;
      color: rgba(136, 136, 136, 0.85);
      pointer-events: none;
      max-width: 70vw;
      text-align: right;
      line-height: 1.3;
    }

    /* ══════════════════════════════════════
       主播全屏直播间
    ══════════════════════════════════════ */
    .anchor-fullscreen {
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
    }

    .anchor-video {
      position: absolute;
      inset: 0;
      background: #111;
    }

    /*
     * 预览容器必须铺满全屏。勿用 position:relative 覆盖 .anchor-video，
     * 否则仅有绝对定位的 <video> 时父级高度会塌成 0（出现 video 375×0）。
     */
    #local_video {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: block;
      background: #000;
      overflow: hidden;
    }
    /* SDK 可能先插入包裹层；占位层保持原样 */
    #local_video > *:not(.video-placeholder) {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }
    /* 使用后代选择器：video 可能在包裹层内，不一定是直接子节点 */
    #local_video video {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      object-fit: cover !important;
      display: block;
      z-index: 0;
    }
    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #444;
    }
    .video-placeholder .icon { font-size: 36px; }
    .video-placeholder p { font-size: 12px; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #555;
    }
    .dot.live { background: var(--red); animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .anchor-top {
      position: absolute;
      z-index: 1;
      top: 0; left: 0; right: 0;
      padding: 48px 14px 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,.65) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .anchor-info { display: flex; align-items: center; gap: 10px; }
    .anchor-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--red);
      border: 2px solid #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .anchor-name { font-size: 16px; font-weight: 700; color: #fff; }
    .anchor-viewers {
      font-size: 13px; color: rgba(255,255,255,.75);
      display: flex; align-items: center; gap: 4px; margin-top: 2px;
    }
    .anchor-top-right { display: flex; align-items: center; gap: 8px; }
    .room-notice {
      position: absolute;
      z-index: 1;
      top: 104px;
      left: 14px;
      right: 72px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 16px;
      background: rgba(10,10,10,.42);
      backdrop-filter: blur(10px);
      color: #fff;
    }
    .room-notice-label {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: linear-gradient(90deg,#ffb347,#ff6f3c);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
    }
    .room-notice-text {
      min-width: 0;
      font-size: 13px;
      line-height: 1.35;
      color: rgba(255,255,255,.94);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stat-pill {
      background: rgba(0,0,0,.45);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 10px;
      color: #4caf50;
      display: none;
    }
    .stat-pill.show { display: block; }
    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,.4);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }

    .danmu-area {
      position: absolute;
      z-index: 1;
      left: 12px;
      right: 12px;
      bottom: calc(64px + var(--safe-bottom));
      height: clamp(182px, 29vh, 236px);
      overflow: hidden;
      --side-safe-width: clamp(84px, 22vw, 96px);
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: flex-end;
      align-items: flex-start;
    }
    .danmu-item {
      --lane-width: calc(100% - 12px);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      background: linear-gradient(90deg, rgba(20,20,20,.72), rgba(20,20,20,.42));
      backdrop-filter: blur(6px);
      border-radius: 18px;
      padding: 5px 12px 5px 6px;
      font-size: 14px;
      color: #fff;
      width: fit-content;
      max-width: min(100%, var(--lane-width));
      box-shadow: 0 8px 24px rgba(0,0,0,.14);
    }
    .danmu-item--wide {
      --lane-width: calc(100% - 12px);
    }
    .danmu-item--side-safe {
      --lane-width: calc(100% - var(--side-safe-width));
    }
    .danmu-item--system {
      background: linear-gradient(90deg, rgba(80,56,24,.72), rgba(48,35,17,.46));
    }
    .danmu-meta {
      display: inline-flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 2px 4px;
      flex-shrink: 0;
      min-width: 0;
    }
    .danmu-role-badge,
    .danmu-level-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 18px;
      padding: 0 7px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .danmu-role-badge.role-anchor {
      background: linear-gradient(90deg,#ff7b54,#ff2d20);
      color: #fff;
    }
    .danmu-role-badge.role-vip {
      background: linear-gradient(90deg,#ffd56a,#ff9f1f);
      color: #683500;
    }
    .danmu-role-badge.role-viewer {
      background: rgba(255,255,255,.14);
      color: rgba(255,255,255,.88);
    }
    .danmu-level-badge {
      background: rgba(255,215,64,.16);
      border: 1px solid rgba(255,215,64,.18);
      color: #ffe58f;
    }
    .danmu-name {
      color: #ffd740;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      line-height: 1.3;
      max-width: 96px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .danmu-text {
      min-width: 0;
      line-height: 1.3;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .danmu-item--system .danmu-name {
      color: #79f8da;
    }
    @keyframes floatAnchorHeart {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-180px) scale(1.5); opacity: 0; }
    }
    .anchor-float-heart {
      position: fixed;
      right: 56px;
      bottom: 110px;
      font-size: 22px;
      pointer-events: none;
      z-index: 20;
      animation: floatAnchorHeart 1.4s ease-out forwards;
    }

    .anchor-bottom {
      position: absolute;
      z-index: 1;
      bottom: 0; left: 0; right: 0;
      padding: 8px 12px calc(8px + var(--safe-bottom));
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 100%);
    }
    .anchor-input-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .fake-input {
      flex: 1;
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 4px 6px 4px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
    }
    .anchor-chat-inline-input {
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
    }
    .anchor-chat-inline-input::placeholder {
      color: rgba(255,255,255,.66);
    }
    .anchor-chat-send-btn {
      height: 30px;
      min-width: 52px;
      padding: 0 12px;
      border-radius: 16px;
      border: none;
      background: var(--red);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }
    .anchor-chat-send-btn:active {
      opacity: .85;
      transform: scale(.98);
    }
    .round-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      background: var(--red);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(240,40,26,.5);
    }
    .round-btn-gray { background: rgba(255,255,255,.2); box-shadow: none; }
    .round-btn-img img { width: 22px; height: 22px; display: block; filter: brightness(0) invert(1); }

    .settings-mask {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.5);
      display: none;
      z-index: 10;
    }
    .settings-mask.show { display: block; }
    .settings-drawer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #1a1a1a;
      border-radius: 20px 20px 0 0;
      padding: 12px 16px calc(24px + var(--safe-bottom));
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      z-index: 11;
    }
    .settings-drawer.show { transform: translateY(0); }
    .drawer-handle {
      width: 36px; height: 4px;
      background: #444;
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .drawer-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .drawer-field { margin-bottom: 14px; }
    .drawer-field label {
      display: block;
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .drawer-field input, .drawer-field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      -webkit-appearance: none;
    }
    .drawer-field input:focus { border-color: var(--red); }
    .drawer-btns { display: flex; gap: 10px; margin-top: 4px; }
    .drawer-btns .btn { flex: 1; }

    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      pointer-events: none;
    }

    .btn {
      flex: 1;
      height: 48px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn:active { opacity: .8; transform: scale(.97); }
    .btn:disabled { opacity: .35; }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    .log-box {
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 11px;
      font-family: 'SF Mono', Menlo, monospace;
      max-height: 130px;
      overflow-y: auto;
      line-height: 1.8;
    }
    .log-box .ok   { color: #4caf50; }
    .log-box .err  { color: #f44336; }
    .log-box .info { color: #42a5f5; }
    .log-box .warn { color: #ffa726; }

    .drawer-field .hint { font-size: 11px; color: #555; margin-top: 6px; line-height: 1.5; }

    .side-btns {
      position: absolute;
      right: 10px;
      bottom: calc(110px + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      z-index: 5;
    }
    .side-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .side-btn-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      border: 1px solid rgba(255,255,255,.15);
    }
    .side-btn-icon-img img { width: 22px; height: 22px; display: block; filter: brightness(0) invert(1); }
    .side-btn-label {
      font-size: 12px;
      color: rgba(255,255,255,.8);
    }
  </style>
</head>
<body>

<div id="page-anchor" class="anchor-fullscreen">

  <div id="local_video" class="anchor-video">
    <div class="video-placeholder">
      <div class="icon">🎙</div>
      <p>点击下方「开始推流」开启摄像头</p>
    </div>
  </div>

  <div class="anchor-top">
    <div class="anchor-info">
      <div class="anchor-avatar">🐱</div>
      <div>
        <div class="anchor-name" id="anchor-room-title">冷丰直播间</div>
        <div class="anchor-viewers"><span class="dot" id="push-dot"></span> <span id="push-status">未开播</span> <span id="room-online-count">· --在线</span> <span id="room-like-count">· 0赞</span></div>
      </div>
    </div>
    <div class="anchor-top-right">
      <div class="stat-pill" id="stat-bar">
        <span id="stat-fps">0</span>fps &nbsp;
        <span id="stat-vbr">0</span>k
      </div>
      <button type="button" class="icon-btn" onclick="showSettings()">⚙️</button>
    </div>
  </div>

  <div class="room-notice" id="anchor-room-notice" hidden>
    <span class="room-notice-label">公告</span>
    <span class="room-notice-text" id="anchor-room-notice-text"></span>
  </div>

  <div class="danmu-area" id="danmu-area">
    <div class="danmu-item danmu-item--system danmu-item--wide" data-message-type="system"><span class="danmu-name">系统：</span><span class="danmu-text">正在连接直播群...</span></div>
  </div>

  <div class="anchor-bottom">
    <div class="anchor-input-row">
      <div class="fake-input">
        <input
          id="anchor-chat-inline-input"
          class="anchor-chat-inline-input"
          type="text"
          maxlength="40"
          placeholder="说点什么..."
          aria-label="主播发送直播间消息"
        />
        <button type="button" class="anchor-chat-send-btn" onclick="sendAnchorMessage('inline')">发送</button>
      </div>
      <button type="button" class="round-btn" onclick="togglePush()" id="btn-push-toggle">
        <span id="push-icon">▶</span>
      </button>
      <button type="button" class="round-btn round-btn-gray round-btn-img" onclick="showSettings()" aria-label="购物车">
        <img src="images/live-sheet-cart-red.png" alt="购物车">
      </button>
    </div>
  </div>

  <div class="side-btns">
    <div class="side-btn" onclick="showSettings()">
      <div class="side-btn-icon">⚙️</div>
      <div class="side-btn-label">设置</div>
    </div>
    <div class="side-btn">
      <div class="side-btn-icon side-btn-icon-img">
        <img src="images/live-sheet-cart-red.png" alt="商品">
      </div>
      <div class="side-btn-label">商品</div>
    </div>
    <div class="side-btn">
      <div class="side-btn-icon side-btn-icon-img">
        <img src="images/live-sheet-order.png" alt="数据">
      </div>
      <div class="side-btn-label">数据</div>
    </div>
  </div>

  <div class="settings-mask" id="settings-mask" onclick="hideSettings()"></div>
  <div class="settings-drawer" id="settings-drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title">推流设置</div>
    <div class="drawer-field">
      <label>Demo 房间</label>
      <div class="select-wrap">
        <select id="anchor-room-select" onchange="handleAnchorRoomChange(this.value)"></select>
      </div>
      <div class="hint" id="anchor-room-hint">切换房间会重置当前主播控制台的配置。</div>
    </div>
    <div class="drawer-field">
      <label>WebRTC 推流地址</label>
      <input id="push-url" type="url" inputmode="url"
        value="webrtc://229319.push.tlivecloud.com/live/1?txSecret=cf9c27bc3ffb73bdf139d70c2de0c076&txTime=69F2B02F"
        placeholder="webrtc://domain/live/stream?txSecret=&txTime=" />
      <div class="hint">云直播控制台 → 直播工具箱 → 地址生成器</div>
    </div>
    <div class="drawer-field">
      <label>视频质量</label>
      <div class="select-wrap">
        <select id="video-quality">
          <option value="720p">720p（推荐）</option>
          <option value="480p">480p（省流量）</option>
          <option value="1080p">1080p（高清）</option>
        </select>
      </div>
    </div>
    <div class="drawer-btns">
      <button type="button" class="btn btn-primary" id="btn-push" onclick="startPush()">▶ 开始推流</button>
      <button type="button" class="btn btn-secondary" id="btn-stop" onclick="stopPush()" disabled>■ 停止推流</button>
    </div>
    <div class="drawer-field" style="margin-top:14px">
      <label>发送弹幕</label>
      <input id="anchor-chat-text" type="text" maxlength="40" placeholder="给观众发一条直播间消息" />
      <div class="hint" id="anchor-im-status">IM 准备连接中...</div>
    </div>
    <div class="drawer-btns">
      <button type="button" class="btn btn-primary" onclick="sendAnchorMessage()">发送弹幕</button>
      <button type="button" class="btn btn-secondary" onclick="refreshAnchorOnlineCount()">刷新在线人数</button>
    </div>
    <div class="drawer-field" style="margin-top:14px">
      <label>直播间公告</label>
      <input id="anchor-announcement-text" type="text" maxlength="80" placeholder="输入直播间公告，例如今晚主推商品和下单提醒" />
      <div class="hint">更新后会同步展示到所有观众页顶部。</div>
    </div>
    <div class="drawer-btns">
      <button type="button" class="btn btn-primary" onclick="sendAnnouncement()">更新公告</button>
      <button type="button" class="btn btn-secondary" onclick="fillDefaultAnnouncement()">恢复默认</button>
    </div>
    <div class="drawer-field" style="margin-top:14px">
      <label>观众访问链接</label>
      <input id="viewer-link" type="text" readonly />
      <div class="hint">把这个链接发给同事，就能直接进入当前直播间。</div>
    </div>
    <div class="log-box" id="push-log" style="margin-top:10px">
      <div class="info">填好推流地址后点「开始推流」</div>
    </div>
  </div>

</div>

<script src="https://video.sdk.qcloudecdn.com/web/TXLivePusher-2.1.1.min.js" charset="utf-8"></script>
<script src="vendor/tencentcloud-chat.js"></script>
<script src="live-im-config.js"></script>
<script src="live-im.js"></script>

<script>
function log(id, msg, type = 'info') {
  const box = document.getElementById(id);
  const el = document.createElement('div');
  el.className = type;
  el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function showSettings(mode) {
  document.getElementById('settings-mask').classList.add('show');
  document.getElementById('settings-drawer').classList.add('show');
  if (mode === 'chat') {
    requestAnimationFrame(() => {
      const input = document.getElementById('anchor-chat-text');
      if (input) input.focus();
    });
  }
}
function hideSettings() {
  document.getElementById('settings-mask').classList.remove('show');
  document.getElementById('settings-drawer').classList.remove('show');
}

function togglePush() {
  const isLive = !document.getElementById('btn-stop').disabled;
  if (isLive) {
    stopPush();
  } else {
    showSettings();
  }
}

const anchorRoomCatalog = window.LIVE_IM_CONFIG && typeof window.LIVE_IM_CONFIG.getRoomList === 'function'
  ? window.LIVE_IM_CONFIG.getRoomList()
  : [];
let activeAnchorRoomId = window.LIVE_IM_CONFIG && typeof window.LIVE_IM_CONFIG.getRoomIdFromLocation === 'function'
  ? window.LIVE_IM_CONFIG.getRoomIdFromLocation(window.location.search)
  : 'orchard';
let activeAnchorRoom = getAnchorRoomConfig(activeAnchorRoomId);
const anchorRole = getAnchorRole();

let anchorIM = null;
let anchorLikeTotal = 0;

function getAnchorRoomConfig(roomId) {
  if (window.LIVE_IM_CONFIG && typeof window.LIVE_IM_CONFIG.getRoomConfig === 'function') {
    return window.LIVE_IM_CONFIG.getRoomConfig(roomId);
  }
  return window.LIVE_IM_CONFIG || {};
}

function getAnchorRole() {
  const params = new URLSearchParams(window.location.search);
  const role = params.get('role');
  const roles = window.LIVE_IM_CONFIG && window.LIVE_IM_CONFIG.roles;
  if (role && roles && roles[role]) {
    return role;
  }
  return (activeAnchorRoom && activeAnchorRoom.recommendedAnchorRole) || 'anchor';
}

function syncAnchorRoomQuery(roomId) {
  const params = new URLSearchParams(window.location.search);
  params.set('room', roomId);
  const query = params.toString();
  history.replaceState(null, '', `${window.location.pathname}${query ? `?${query}` : ''}`);
}

function renderAnchorRoomOptions() {
  const select = document.getElementById('anchor-room-select');
  if (!select) return;
  select.innerHTML = anchorRoomCatalog.map(room => `
    <option value="${room.roomId}">${room.title} · ${room.subtitle || '直播间'}</option>
  `).join('');
  select.value = activeAnchorRoomId;
}

function updateViewerLink() {
  const input = document.getElementById('viewer-link');
  if (!input) return;
  const url = new URL('viewer.html', window.location.href);
  url.searchParams.set('room', activeAnchorRoomId);
  input.value = url.toString();
}

function resetAnchorDanmuArea() {
  const area = document.getElementById('danmu-area');
  area.innerHTML = '<div class="danmu-item danmu-item--system danmu-item--wide" data-message-type="system"><span class="danmu-name">系统：</span><span class="danmu-text">正在连接直播群...</span></div>';
  refreshAnchorDanmuLayout();
}

function applyAnchorRoomConfig(roomId) {
  activeAnchorRoomId = roomId;
  activeAnchorRoom = getAnchorRoomConfig(roomId);
  document.title = `${activeAnchorRoom.title} — 主播`;
  document.getElementById('anchor-room-title').textContent = activeAnchorRoom.anchorRoomTitle || `${activeAnchorRoom.title}直播间`;
  document.getElementById('push-url').value = activeAnchorRoom.pushUrl || '';
  document.getElementById('anchor-room-hint').textContent = activeAnchorRoom.pushUrl
    ? '当前房间已预置一条推流地址，也可以手动替换。'
    : '当前房间还没预置真实推流地址，建议在这里粘贴腾讯云地址生成器给出的地址。';
  document.getElementById('room-online-count').textContent = `· ${activeAnchorRoom.defaultViewerCount || '--'}在线`;
  updateViewerLink();
  fillDefaultAnnouncement();
  setAnchorAnnouncement(activeAnchorRoom.announcement || '');
  renderAnchorRoomOptions();
  syncAnchorRoomQuery(activeAnchorRoomId);
}

function createAnchorBadge(className, text) {
  const el = document.createElement('span');
  el.className = className;
  el.textContent = text;
  return el;
}

function updateAnchorLikeCount(delta) {
  anchorLikeTotal = Math.max(0, anchorLikeTotal + (delta || 0));
  document.getElementById('room-like-count').textContent = `· ${anchorLikeTotal}赞`;
}

function refreshAnchorDanmuLayout() {
  const area = document.getElementById('danmu-area');
  const items = Array.from(area.children);
  const safeCount = items.length >= 5 ? 3 : 2;

  items.forEach((item, index) => {
    const distanceFromBottom = items.length - index - 1;
    const useSideSafeLane = items.length >= 3 && distanceFromBottom < safeCount;

    item.classList.remove('danmu-item--wide', 'danmu-item--side-safe', 'danmu-item--system');
    item.classList.add(useSideSafeLane ? 'danmu-item--side-safe' : 'danmu-item--wide');

    if (item.dataset.messageType === 'system') {
      item.classList.add('danmu-item--system');
    }
  });
}

function burstAnchorHeart() {
  const heart = document.createElement('div');
  const emojis = ['❤️', '💖', '💕', '🧡'];
  heart.className = 'anchor-float-heart';
  heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  heart.style.right = (44 + Math.random() * 24) + 'px';
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 1400);
}

function addDanmu(name, msg, profile = null) {
  const area = document.getElementById('danmu-area');
  const el = document.createElement('div');
  const metaEl = document.createElement('div');
  const nameEl = document.createElement('span');
  const textEl = document.createElement('span');

  el.className = 'danmu-item';
  if ((profile && profile.messageType === 'system') || name === '系统') {
    el.dataset.messageType = 'system';
  }
  metaEl.className = 'danmu-meta';
  nameEl.className = 'danmu-name';
  nameEl.textContent = `${name}：`;
  textEl.className = 'danmu-text';
  textEl.textContent = msg;

  if (profile && profile.roleLabel) {
    metaEl.appendChild(createAnchorBadge(`danmu-role-badge role-${profile.roleTone || profile.roleKey || 'viewer'}`, profile.roleLabel));
  }
  if (profile && profile.levelLabel) {
    metaEl.appendChild(createAnchorBadge('danmu-level-badge', profile.levelLabel));
  }
  metaEl.appendChild(nameEl);

  el.appendChild(metaEl);
  el.appendChild(textEl);
  area.appendChild(el);
  if (area.children.length > 8) area.removeChild(area.children[0]);
  refreshAnchorDanmuLayout();
}

function setAnchorImStatus(text) {
  const el = document.getElementById('anchor-im-status');
  if (el) el.textContent = text;
}

function setAnchorAnnouncement(text) {
  const notice = document.getElementById('anchor-room-notice');
  const textEl = document.getElementById('anchor-room-notice-text');
  const input = document.getElementById('anchor-announcement-text');
  const value = String(text || '').trim();

  if (input && document.activeElement !== input) {
    input.value = value;
  }
  if (!notice || !textEl) return;
  if (!value) {
    notice.hidden = true;
    textEl.textContent = '';
    return;
  }

  textEl.textContent = value;
  notice.hidden = false;
}

function fillDefaultAnnouncement() {
  const input = document.getElementById('anchor-announcement-text');
  if (input) {
    input.value = (activeAnchorRoom && activeAnchorRoom.announcement) || '';
  }
}

async function destroyAnchorIM() {
  if (!anchorIM) return;
  if (typeof anchorIM.destroy === 'function') {
    await anchorIM.destroy();
  }
  anchorIM = null;
}

async function initAnchorIM() {
  try {
    setAnchorImStatus('IM 连接中...');
    anchorIM = LiveIM.createClient(anchorRole, {
      log(message, type) {
        log('push-log', message, type);
      },
      onTextMessage(message) {
        addDanmu(message.nick, message.text, message.profile);
      },
      onLike(message) {
        updateAnchorLikeCount(message.count);
        addDanmu(message.nick, `点赞了直播间 x${message.count}`, message.profile);
        for (let index = 0; index < Math.min(message.count, 5); index += 1) {
          setTimeout(() => burstAnchorHeart(), index * 120);
        }
      },
      onJoinNotice(message) {
        addDanmu('系统', message.text);
      },
      onAnnouncement(message) {
        setAnchorAnnouncement(message.text);
        log('push-log', `直播公告已更新：${message.text}`, 'info');
      },
      onOnlineCount(count) {
        document.getElementById('room-online-count').textContent = `· ${count}在线`;
      },
      onJoined() {
        setAnchorImStatus(`IM 已加入直播群（${anchorRole}）`);
      }
    }, {
      roomId: activeAnchorRoomId
    });
    await anchorIM.connect();
    setAnchorImStatus(`IM 已连接，可给观众发消息（${anchorRole}）`);
  } catch (error) {
    setAnchorImStatus('IM 连接失败，请检查测试账号');
    log('push-log', `IM 初始化失败：${LiveIM.normalizeError(error)}`, 'err');
  }
}

async function handleAnchorRoomChange(roomId) {
  if (!roomId || roomId === activeAnchorRoomId) return;
  if (livePusher) {
    stopPush();
  }
  await destroyAnchorIM();
  resetAnchorDanmuArea();
  anchorLikeTotal = 0;
  document.getElementById('room-like-count').textContent = '· 0赞';
  applyAnchorRoomConfig(roomId);
  await initAnchorIM();
  log('push-log', `已切换到 ${activeAnchorRoom.title}`, 'ok');
}

async function sendAnnouncement() {
  const input = document.getElementById('anchor-announcement-text');
  const text = input.value.trim();

  if (!text) {
    alert('请先输入公告内容');
    input.focus();
    return;
  }
  if (!anchorIM) {
    alert('IM 还没连接好，请稍后重试');
    return;
  }

  try {
    await anchorIM.sendAnnouncement(text);
    setAnchorAnnouncement(text);
    log('push-log', '直播公告已更新 ✓', 'ok');
  } catch (error) {
    log('push-log', `直播公告更新失败：${LiveIM.normalizeError(error)}`, 'err');
  }
}

async function sendAnchorMessage(source = 'drawer') {
  const input = document.getElementById(source === 'inline' ? 'anchor-chat-inline-input' : 'anchor-chat-text');
  const text = input.value.trim();
  if (!text) {
    if (source !== 'inline') {
      alert('请先输入直播间消息');
    }
    input.focus();
    return;
  }
  if (!anchorIM) {
    alert('IM 还没连接好，请稍后重试');
    return;
  }

  try {
    await anchorIM.sendText(text, { priority: 'high' });
    input.value = '';
    if (source !== 'inline') {
      hideSettings();
    }
    log('push-log', '直播间消息发送成功 ✓', 'ok');
  } catch (error) {
    log('push-log', `直播间消息发送失败：${LiveIM.normalizeError(error)}`, 'err');
  }
}

async function refreshAnchorOnlineCount() {
  if (!anchorIM) return;
  try {
    const count = await anchorIM.refreshOnlineCount();
    if (typeof count === 'number') {
      document.getElementById('room-online-count').textContent = `· ${count}在线`;
      log('push-log', `在线人数已刷新：${count}`, 'info');
    }
  } catch (error) {
    log('push-log', `刷新在线人数失败：${LiveIM.normalizeError(error)}`, 'warn');
  }
}

let livePusher = null;

async function startPush() {
  const pushUrl = document.getElementById('push-url').value.trim();
  if (!pushUrl) { alert('请填写推流地址'); return; }
  if (!pushUrl.startsWith('webrtc://')) { alert('推流地址须以 webrtc:// 开头'); return; }
  if (typeof TXLivePusher === 'undefined') {
    log('push-log', 'SDK 加载失败，请检查网络后刷新', 'err'); return;
  }

  try {
    if (livePusher) {
      log('push-log', '已在推流中，请先停止再开始', 'warn');
      return;
    }

    log('push-log', '检测浏览器兼容性...', 'info');
    const support = await TXLivePusher.checkSupport();
    if (!support.isWebRTCSupported) {
      log('push-log', '浏览器不支持 WebRTC，请换用 Chrome', 'err'); return;
    }
    log('push-log', '兼容性检测通过 ✓', 'ok');

    /* 必须先清空容器，否则会与占位层并存，SDK 可能注入多个 <video> 并排显示 */
    document.getElementById('local_video').innerHTML = '';

    livePusher = new TXLivePusher();
    livePusher.setRenderView('local_video');
    livePusher.videoView.muted = true;

    const vq = document.getElementById('video-quality').value;
    livePusher.setVideoQuality(vq);
    livePusher.setAudioQuality('standard');
    livePusher.setProperty('setVideoFPS', 25);
    try {
      const vres = { '480p': { width: 854, height: 480 }, '720p': { width: 1280, height: 720 }, '1080p': { width: 1920, height: 1080 } }[vq] || { width: 1280, height: 720 };
      livePusher.setProperty('setVideoResolution', vres);
    } catch (e) { /* SDK 不支持时忽略 */ }

    livePusher.setObserver({
      onPushStatusUpdate(status, msg) {
        const map = {
          disconnected: ['连接断开', 'warn'],
          connecting:   ['连接中...', 'info'],
          connected:    ['连接成功 ✓', 'ok'],
          reconnecting: ['重连中...', 'warn'],
        };
        const [text, type] = map[status] || [status, 'info'];
        log('push-log', text, type);
      },
      onStatisticsUpdate(data) {
        const fps = (data.video && data.video.framesPerSecond) || 0;
        const vbr = Math.round(((data.video && data.video.bitrate) || 0) / 1000);
        const el = document.getElementById('stat-fps');
        const el2 = document.getElementById('stat-vbr');
        if (el) el.textContent = fps;
        if (el2) el2.textContent = vbr;
      },
    });

    log('push-log', '请求摄像头和麦克风权限（弹窗请点「允许」）', 'warn');
    await Promise.all([livePusher.startCamera(), livePusher.startMicrophone()]);
    log('push-log', '摄像头已开启 ✓', 'ok');

    await livePusher.startPush(pushUrl);

    document.getElementById('push-dot').classList.add('live');
    document.getElementById('push-status').textContent = '直播中';
    document.getElementById('btn-push').disabled = true;
    document.getElementById('btn-stop').disabled = false;
    document.getElementById('stat-bar').classList.add('show');
    hideSettings();
    document.getElementById('push-icon').textContent = '■';
    log('push-log', '推流成功！正在直播 ✓', 'ok');

  } catch (e) {
    log('push-log', `失败：${e.message || e}`, 'err');
    if (livePusher) {
      try {
        livePusher.stopPush();
        livePusher.stopCamera();
        livePusher.stopMicrophone();
      } catch (err) { /* ignore */ }
      livePusher = null;
    }
    document.getElementById('local_video').innerHTML =
      '<div class="video-placeholder"><div class="icon">🎙</div><p>点击「开始推流」开启摄像头</p></div>';
  }
}

function stopPush() {
  if (!livePusher) return;
  livePusher.stopPush();
  livePusher.stopCamera();
  livePusher.stopMicrophone();
  livePusher = null;

  document.getElementById('push-dot').classList.remove('live');
  document.getElementById('push-status').textContent = '未开播';
  document.getElementById('btn-push').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('stat-bar').classList.remove('show');
  document.getElementById('push-icon').textContent = '▶';
  document.getElementById('local_video').innerHTML =
    '<div class="video-placeholder"><div class="icon">🎙</div><p>点击「开始推流」开启摄像头</p></div>';
  log('push-log', '已停止推流', 'info');
}

window.addEventListener('DOMContentLoaded', () => {
  applyAnchorRoomConfig(activeAnchorRoomId);
  resetAnchorDanmuArea();
  initAnchorIM();
  document.getElementById('anchor-chat-inline-input').addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      sendAnchorMessage('inline');
    }
  });
  document.getElementById('anchor-chat-text').addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      sendAnchorMessage();
    }
  });
  document.getElementById('anchor-announcement-text').addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      sendAnnouncement();
    }
  });
});
</script>
<div id="build-verify" class="build-verify" hidden aria-hidden="true"></div>
<script>
(function () {
  var el = document.getElementById('build-verify');
  if (!el) return;
  fetch('build-info.json', { cache: 'no-store' })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (j) {
      if (!j || !j.commit) return;
      el.textContent = '官方构建 · ' + j.commit.slice(0, 7);
      el.title = '仓库：' + (j.repo || '') + '\n提交：' + j.commit + '\n构建：' + (j.builtAt || '');
      el.hidden = false;
    })
    .catch(function () {});
})();
</script>
